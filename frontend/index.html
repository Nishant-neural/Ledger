<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udhaar Ledger</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-shell">
    <header class="hero">
        <div>
            <h1>Udhaar Ledger</h1>
            <p>Track customers, credit, and payments with a simple ledger interface.</p>
        </div>
    </header>

    <main>
        <section class="card grid-two">
            <div>
                <h2>Add Customer</h2>
                <div class="form-row">
                    <input id="name" placeholder="Name" />
                    <input id="phone" placeholder="Phone" />
                </div>
                <button id="addCustomerBtn">Add Customer</button>
            </div>

            <div>
                <h2>Add Transaction</h2>
                <div class="form-row">
                    <select id="customerSelect">
                        <option value="">Select customer</option>
                    </select>
                    <input id="amount" type="number" step="0.01" placeholder="Amount" />
                    <select id="type">
                        <option value="credit">Udhaar</option>
                        <option value="payment">Payment</option>
                    </select>
                </div>
                <button id="addTxnBtn">Add Transaction</button>
            </div>
        </section>

        <section class="card">
            <h2>Customers</h2>
            <table class="data-table" id="customerList">
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Phone</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section class="card">
            <h2>Ledger</h2>
            <div class="form-row">
                <select id="ledgerCustomerSelect">
                    <option value="">Choose customer</option>
                </select>
                <button id="viewLedgerBtn">View Ledger</button>
            </div>
            <div id="ledgerResult" class="ledger-output"></div>
        </section>
    </main>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

async function api(path, options = {}) {
    const response = await fetch(`${API_BASE}${path}`, {
        headers: {"Content-Type": "application/json"},
        ...options,
    });
    if (!response.ok) {
        const error = await response.json().catch(() => null);
        throw new Error(error?.detail || response.statusText || "Request failed");
    }
    return response.json();
}

async function refreshCustomers() {
    const customers = await api("/customers/");
    const listBody = document.querySelector("#customerList tbody");
    const customerSelect = document.getElementById("customerSelect");
    const ledgerSelect = document.getElementById("ledgerCustomerSelect");

    listBody.innerHTML = "";
    customerSelect.innerHTML = "<option>Select customer</option>";
    ledgerSelect.innerHTML = "<option>Choose customer</option>";

    customers.forEach(customer => {
        const row = document.createElement("tr");
        row.innerHTML = `<td>${customer.id}</td><td>${customer.name}</td><td>${customer.phone}</td>`;
        listBody.appendChild(row);

        const option = document.createElement("option");
        option.value = customer.id;
        option.textContent = `${customer.name} (#${customer.id})`;
        customerSelect.appendChild(option);
        ledgerSelect.appendChild(option.cloneNode(true));
    });
}

async function addCustomer() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    if (!name || !phone) return alert("Please enter both name and phone.");

    await api("/customers/", {
        method: "POST",
        body: JSON.stringify({name, phone}),
    });

    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    await refreshCustomers();
    alert("Customer added successfully.");
}

async function addTxn() {
    const customerId = document.getElementById("customerSelect").value;
    const amount = parseFloat(document.getElementById("amount").value);
    const type = document.getElementById("type").value;
    if (!customerId) return alert("Select a customer first.");
    if (!amount || amount <= 0) return alert("Enter a positive amount.");

    await api("/transaction/", {
        method: "POST",
        body: JSON.stringify({customer_id: Number(customerId), amount, type}),
    });

    document.getElementById("amount").value = "";
    alert("Transaction added successfully.");
}

function formatCurrency(value) {
    return value.toLocaleString(undefined, {style: "currency", currency: "INR", minimumFractionDigits: 2});
}

async function viewLedger() {
    const customerId = document.getElementById("ledgerCustomerSelect").value;
    if (!customerId) return alert("Choose a customer to view the ledger.");

    const ledger = await api(`/ledger/${customerId}`);
    const result = document.getElementById("ledgerResult");
    result.innerHTML = "";

    const heading = document.createElement("div");
    heading.className = "ledger-summary";
    heading.innerHTML = `<strong>Balance:</strong> ${formatCurrency(ledger.balance)}`;
    result.appendChild(heading);

    const table = document.createElement("table");
    table.className = "data-table";
    table.innerHTML = `
        <thead>
            <tr><th>ID</th><th>Type</th><th>Amount</th><th>Date</th></tr>
        </thead>
        <tbody>${ledger.transactions.map(txn => `
            <tr>
                <td>${txn.id}</td>
                <td>${txn.type}</td>
                <td>${formatCurrency(txn.amount)}</td>
                <td>${new Date(txn.timestamp).toLocaleString()}</td>
            </tr>
        `).join("")}</tbody>
    `;
    result.appendChild(table);
}

window.addEventListener("DOMContentLoaded", async () => {
    document.getElementById("addCustomerBtn").addEventListener("click", addCustomer);
    document.getElementById("addTxnBtn").addEventListener("click", addTxn);
    document.getElementById("viewLedgerBtn").addEventListener("click", viewLedger);
    await refreshCustomers();
});
</script>
</body>
</html>
