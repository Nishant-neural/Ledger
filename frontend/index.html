<!DOCTYPE html>
<html>
<head>
    <title>Udhaar App</title>
</head>
<body>

<h2>Add Customer</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="addCustomer()">Add</button>

<h2>Add Transaction</h2>
<input id="cid" placeholder="Customer ID">
<input id="amount" placeholder="Amount">
<select id="type">
    <option value="credit">Udhaar</option>
    <option value="payment">Payment</option>
</select>
<button onclick="addTxn()">Add</button>

<script>
async function addCustomer() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    await fetch(`http://127.0.0.1:8000/customers/?name=${name}&phone=${phone}`, {
        method: "POST"
    });

    alert("Customer added");
}

async function addTxn() {
    let cid = document.getElementById("cid").value;
    let amount = document.getElementById("amount").value;
    let type = document.getElementById("type").value;

    await fetch(`http://127.0.0.1:8000/transaction/?customer_id=${cid}&amount=${amount}&type=${type}`, {
        method: "POST"
    });

    alert("Transaction added");
}
</script>

</body>
</html>
