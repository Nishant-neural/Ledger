<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udhaar Ledger</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-shell">
    <header class="hero">
        <div>
            <h1>Udhaar Ledger</h1>
            <p>Track customers, credit, and payments with a simple ledger interface.</p>
        </div>
    </header>

    <main>
        <section class="card grid-two">
            <div>
                <h2>Add Customer</h2>
                <div class="form-row">
                    <input id="name" placeholder="Name" />
                    <input id="phone" placeholder="Phone" />
                </div>
                <button id="addCustomerBtn">Add Customer</button>
            </div>

            <div>
                <h2>Add Transaction</h2>
                <div class="form-row">
                    <input id="customerSelectInput" placeholder="Search customer" list="customerListData" autocomplete="off" />
                    <datalist id="customerListData"></datalist>
                    <input id="customerSelect" type="hidden" />
                    <input id="amount" type="number" step="0.01" placeholder="Amount" />
                    <select id="type">
                        <option value="credit">Udhaar</option>
                        <option value="payment">Payment</option>
                    </select>
                    <input id="quantity" type="number" placeholder="Quantity" />
                    <select id="type_option">
                        <option value="">Select type</option>
                        <option value="ss">SS</option>
                        <option value="ms">MS</option>
                    </select>
                    <input id="price_per_pc" type="number" step="0.01" placeholder="Price per pc" />
                </div>
                <button id="addTxnBtn">Add Transaction</button>
            </div>
        </section>

        <section class="card">
            <h2>Customers</h2>
            <table class="data-table" id="customerList">
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Phone</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section class="card">
            <h2>Ledger</h2>
            <div class="form-row">
                <input id="ledgerCustomerSelectInput" placeholder="Search customer" list="ledgerCustomerListData" autocomplete="off" />
                <datalist id="ledgerCustomerListData"></datalist>
                <input id="ledgerCustomerSelect" type="hidden" />
                <button id="viewLedgerBtn">View Ledger</button>
            </div>
            <div id="ledgerResult" class="ledger-output"></div>
        </section>
    </main>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

async function api(path, options = {}) {
    const response = await fetch(`${API_BASE}${path}`, {
        headers: {"Content-Type": "application/json"},
        ...options,
    });
    if (!response.ok) {
        const error = await response.json().catch(() => null);
        throw new Error(error?.detail || response.statusText || "Request failed");
    }
    return response.json();
}

const customerSearchMap = {};
const ledgerCustomerSearchMap = {};

async function refreshCustomers() {
    const customers = await api("/customers/");
    const listBody = document.querySelector("#customerList tbody");
    const customerSelectInput = document.getElementById("customerSelectInput");
    const customerSelect = document.getElementById("customerSelect");
    const customerDatalist = document.getElementById("customerListData");
    const ledgerSelectInput = document.getElementById("ledgerCustomerSelectInput");
    const ledgerCustomerSelect = document.getElementById("ledgerCustomerSelect");
    const ledgerCustomerDatalist = document.getElementById("ledgerCustomerListData");

    listBody.innerHTML = "";
    customerSelectInput.value = "";
    customerSelect.value = "";
    customerDatalist.innerHTML = "";
    ledgerSelectInput.value = "";
    ledgerCustomerSelect.value = "";
    ledgerCustomerDatalist.innerHTML = "";
    Object.keys(customerSearchMap).forEach(key => delete customerSearchMap[key]);
    Object.keys(ledgerCustomerSearchMap).forEach(key => delete ledgerCustomerSearchMap[key]);

    customers.forEach(customer => {
        const displayText = `${customer.name} (#${customer.id})`;
        const row = document.createElement("tr");
        row.innerHTML = `<td>${customer.id}</td><td>${customer.name}</td><td>${customer.phone}</td>`;
        listBody.appendChild(row);

        const option = document.createElement("option");
        option.value = displayText;
        customerDatalist.appendChild(option);
        customerSearchMap[displayText] = customer.id;

        const ledgerOption = document.createElement("option");
        ledgerOption.value = displayText;
        ledgerCustomerDatalist.appendChild(ledgerOption);
        ledgerCustomerSearchMap[displayText] = customer.id;
    });
}

document.addEventListener("DOMContentLoaded", () => {
    const customerSelectInput = document.getElementById("customerSelectInput");
    const customerSelect = document.getElementById("customerSelect");
    const ledgerSelectInput = document.getElementById("ledgerCustomerSelectInput");
    const ledgerCustomerSelect = document.getElementById("ledgerCustomerSelect");

    customerSelectInput.addEventListener("input", () => {
        customerSelect.value = customerSearchMap[customerSelectInput.value] || "";
    });

    ledgerSelectInput.addEventListener("input", () => {
        ledgerCustomerSelect.value = ledgerCustomerSearchMap[ledgerSelectInput.value] || "";
    });
});

async function addCustomer() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    if (!name || !phone) return alert("Please enter both name and phone.");

    await api("/customers/", {
        method: "POST",
        body: JSON.stringify({name, phone}),
    });

    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    await refreshCustomers();
    alert("Customer added successfully.");
}

async function addTxn() {
    const customerId = document.getElementById("customerSelect").value;
    const amount = parseFloat(document.getElementById("amount").value);
    const type = document.getElementById("type").value;
    const quantity = document.getElementById("quantity").value ? parseInt(document.getElementById("quantity").value) : null;
    const type_option = document.getElementById("type_option").value || null;
    const price_per_pc = document.getElementById("price_per_pc").value ? parseFloat(document.getElementById("price_per_pc").value) : null;
    if (!customerId) return alert("Select a customer first.");
    if (!amount || amount <= 0) return alert("Enter a positive amount.");

    await api("/transaction/", {
        method: "POST",
        body: JSON.stringify({customer_id: Number(customerId), amount, type, quantity, type_option, price_per_pc}),
    });

    document.getElementById("customerSelectInput").value = "";
    document.getElementById("customerSelect").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("quantity").value = "";
    document.getElementById("type_option").value = "";
    document.getElementById("price_per_pc").value = "";
    alert("Transaction added successfully.");
}

function formatCurrency(value) {
    return value.toLocaleString(undefined, {style: "currency", currency: "INR", minimumFractionDigits: 2});
}

async function viewLedger() {
    const customerId = document.getElementById("ledgerCustomerSelect").value;
    if (!customerId) return alert("Choose a customer to view the ledger.");

    const ledger = await api(`/ledger/${customerId}`);
    const result = document.getElementById("ledgerResult");
    result.innerHTML = "";

    const heading = document.createElement("div");
    heading.className = "ledger-summary";
    heading.innerHTML = `<strong>Balance:</strong> ${formatCurrency(ledger.balance)}`;
    result.appendChild(heading);

    const table = document.createElement("table");
    table.className = "data-table";
    table.innerHTML = `
        <thead>
            <tr><th>ID</th><th>Type</th><th>Amount</th><th>Quantity</th><th>Type Option</th><th>Price per pc</th><th>Date</th></tr>
        </thead>
        <tbody>${ledger.transactions.map(txn => `
            <tr>
                <td>${txn.id}</td>
                <td>${txn.type}</td>
                <td>${formatCurrency(txn.amount)}</td>
                <td>${txn.quantity || ''}</td>
                <td>${txn.type_option || ''}</td>
                <td>${txn.price_per_pc ? formatCurrency(txn.price_per_pc) : ''}</td>
                <td>${new Date(txn.timestamp).toLocaleString()}</td>
            </tr>
        `).join("")}</tbody>
    `;
    result.appendChild(table);
}

window.addEventListener("DOMContentLoaded", async () => {
    document.getElementById("addCustomerBtn").addEventListener("click", addCustomer);
    document.getElementById("addTxnBtn").addEventListener("click", addTxn);
    document.getElementById("viewLedgerBtn").addEventListener("click", viewLedger);
    await refreshCustomers();
});
</script>
</body>
</html>
